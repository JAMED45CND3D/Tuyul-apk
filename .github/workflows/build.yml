name: Build Tuyul APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract project files
        run: |
          echo "" | base64 -d > payload.zip
          unzip -o payload.zip -d .
          rm payload.zip
          chmod +x gradlew
          echo "--- Structure check ---"
          find . -name "*.kt" -o -name "AndroidManifest.xml" | head -20

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Setup Android SDK
        run: yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true

      - name: Build APK
        run: gradle assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: tuyul-digital
          path: app/build/outputs/apk/release/app-release.apk
